<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>My form exercise</title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="styles.css"/>
  </head>
  <body>
    <header>
      <h1>Product Pick</h1>
    </header>
    <main>
      <form>
        <!-- write your html here-->
        <!-- 
          1. What is the customer's name? I must collect this data and ensure it contains at least two non-space characters.
2. What is the customer's email? I must make sure the email is valid. Email addresses follow a consistent pattern.
3. What colour should this T-shirt be? I must provide 3 options. How will I ensure they do not choose other colours?
4. What size does the customer want? I must provide the following 6 options: XS, S, M, L, XL, XXL

- [*] Interpret requirements and check against a list of criteria
- [*] Write a valid form
- [ ] Test with Devtools
- [ ] Refactor using Devtools
- [*] Use version control by committing often and pushing regularly to GitHub
- [*] Develop the habit of writing clean, well-structured, and error-free code
- [*] I have only used HTML and CSS.
- [*] I have not used any JavaScript.
- [*] My form is semantic HTML.
- [*] All inputs have associated labels.
- [ ] My Lighthouse Accessibility score is 100.
- [*] I require a valid name. 
- [*] I require a valid email.
- [*] I require one colour from a defined set of 3 colours.
- [*] I require one size from a defined set of 6 sizes.
- [ ] My HTML code has no errors or warnings when validated using https://validator.w3.org/
- [ ] My code is consistently formatted
- [ ] My page content is free of typos and grammatical mistakes
- [*] I commit often and push regularly to GitHub
-->
        <div class="name-container container">
          <label for="name">What is your full name please?</label>
          <input type="text" id="name" name="name" required pattern=".*\S.*\S.*"/>
        </div>
        <div class="email-container container">
          <label for="email">What is your email please?</label>
          <input type="email" id="email" name="email" required/>
        </div>
        <div class="colour-select-container container">
          <label for="colour">Select a colour: </label>
          <select id="colour" name="colour" required>
            <option name="black">Black</option>
            <option name="red">Red</option>
            <option name="blue">Blue</option>
          </select>
        </div>
        <div class="size-select-container container">
          <label for="size">Select a size: </label>
          <select id="size" name="size" required>
            <option name="XS">XS</option>
            <option name="S">S</option>
            <option name="M">M</option>
            <option name="L">L</option>
            <option name="XL">XL</option>
            <option name="XXL">XXL</option>
          </select>
        </div>
        <div class="submit-btn-container container">
          <label for="submit-btn">Submit</label>
          <button type="submit" id="submit-btn">Submit</button>
        </div>
      </form>
    </main>
    <footer>
      <!-- change to your name-->
      <p>By Hanna Bohlin</p>
    </footer>
  </body>
</html>
